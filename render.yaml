services:
  - type: web
    name: flodo-task-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./tasks.db   # replace with Render PostgreSQL URL after adding DB
    healthCheckPath: /health
