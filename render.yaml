services:
  - type: web
    name: flodo-task-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./tasks.db
      - key: PYTHON_VERSION
        value: "3.11.9"
    healthCheckPath: /health